name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Zig
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check build.zig src/root.zig

      - name: Run tests
        run: zig build test
